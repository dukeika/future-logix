version: 1
frontend:
  phases:
    preBuild:
      commands:
        - printf "PAYSTACK_SERVER_KEY=%s\nPAYSTACK_PUBLIC_KEY=%s\n" "$PAYSTACK_SERVER_KEY" "$PAYSTACK_PUBLIC_KEY" > .env.production
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
