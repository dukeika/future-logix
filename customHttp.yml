customHeaders:
  - pattern: "**/*"
    headers:
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - key: "Permissions-Policy"
        value: "camera=(), microphone=(), geolocation=(), browsing-topics=(), payment=(), usb=()"
      - key: "Content-Security-Policy"
        value: "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://plausible.io; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.google-analytics.com https://plausible.io https://vitals.vercel-insights.com; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
  - pattern: "**/*.{js,css,woff,woff2,svg,jpg,jpeg,png,webp,avif}"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  - pattern: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=0, s-maxage=600, stale-while-revalidate=86400"
